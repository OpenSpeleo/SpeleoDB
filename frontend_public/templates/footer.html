{% load static %}

<!-- Site footer -->
<footer>
    <div class="max-w-4xl mx-auto px-4 sm:px-6">

        <!-- Blocks -->
        <div class="grid sm:grid-cols-12 gap-8 py-8 md:py-12">

            <!-- 1st block -->
            <div class="col-span-12 ">
                <div class="h-full">
                    <div class="mb-6 sm:mb-0">
                        <div class="mb-6 flex justify-center ">
                            <!-- Logo -->
                            <a class="inline-flex" href="{% url 'home' %}" aria-label="SpeleoDB">
                                <img src="{% static 'media/logo.svg' %}" style="height:65px" alt="SpeleoDB">
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2nd block -->
            <div class="grid grid-cols-12 gap-8 col-span-12 text-center">

                <!-- 1st sub block -->
                <div class="sm:col-span-4 col-span-12 order-1 sm:order-0 mb-6 sm:mb-0">
                    <h6 class="text-sm text-slate-50 font-medium mb-4">Legals</h6>
                    <ul class="text-sm space-y-2">
                        <li>
                            <a class="text-slate-400 hover:text-slate-200 transition duration-150 ease-in-out" href="https://www.usahinstitute.org">USAHInstitute.org</a>
                        </li>
                        <li>
                            <a class="text-slate-400 hover:text-slate-200 transition duration-150 ease-in-out" href="{% url 'terms_and_conditions' %}">Terms & Conditions</a>
                        </li>
                        <li>
                            <a class="text-slate-400 hover:text-slate-200 transition duration-150 ease-in-out" href="{% url 'privacy_policy' %}">Privacy policy</a>
                        </li>
                    </ul>
                </div>

                <!-- 2nd sub block-->
                 <div class="sm:col-span-4 col-span-12 order-0 sm:order-1 mb-6 sm:mb-0">
                    <h6 class="text-sm text-slate-50 font-medium mb-4">SpeleoDB</h6>
                    <ul class="text-sm space-y-2">
                        <li>
                            <a class="text-slate-400 hover:text-slate-200 transition duration-150 ease-in-out" href="{% url 'about' %}">About</a>
                        </li>
                        <li>
                            <a class="text-slate-400 hover:text-slate-200 transition duration-150 ease-in-out" href="{% url 'changelog' %}">Changelog</a>
                        </li>
                        <li>
                            <a class="text-slate-400 hover:text-slate-200 transition duration-150 ease-in-out" href="{% url 'roadmap' %}">Roadmap</a>
                        </li>
                        <li>
                            <a class="text-slate-400 hover:text-slate-200 transition duration-150 ease-in-out" href="{% url 'download' %}">Download App</a>
                        </li>
                    </ul>
                </div>

                <!-- 3rd sub block -->
                <div class="sm:col-span-4 col-span-12 order-2 sm:order-2 mb-6 sm:mb-0">
                    <h6 class="text-sm text-slate-50 font-medium mb-4">Resources</h6>
                    <ul class="text-sm space-y-2">
                        <li>
                            <a class="text-slate-400 hover:text-slate-200 transition duration-150 ease-in-out" target="_blank" href="https://github.com/OpenSpeleo/SpeleoDB">Contribute to SpeleoDB</a>
                        </li>
                        <li>
                            <a class="text-slate-400 hover:text-slate-200 transition duration-150 ease-in-out" target="_blank" href="https://github.com/OpenSpeleo/SpeleoDB/issues">Report a vulnerability</a>
                        </li>
                    </ul>
                </div>
            </div> 

            <!--3rd block -->
            <div class="col-span-12">
                <div class="h-full text-center ">
                    <div class="mb-6 sm:mb-0">
                        
                        <div class="text-sm text-slate-300">&copy; {{ request.get_host }} <span class="text-slate-500">-</span> All rights reserved.</div>
                    </div>
                </div>
            </div>

        </div>

    </div>
</footer>
